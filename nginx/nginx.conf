# ──────────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy
#
# Topology (single host):
#
#   Browser → Nginx :80 → /api/*            → backend:3001 (Express)
#                       → /socket.io/*      → backend:3001 (Socket.IO with WS upgrade)
#                       → /metrics          → backend:3001 (Prometheus scrape, internal only)
#                       → /*               → frontend:80  (React SPA / Nginx static)
#
# For multi-instance (load balancing): add more backend lines to the upstream
# block and PM2 cluster handles per-machine core utilisation.
#
# Sticky sessions vs Redis adapter:
#   We use the Socket.IO Redis adapter (see backend/sockets/index.js) so any
#   backend instance can emit to any socket. Sticky sessions (ip_hash) are NOT
#   needed and NOT used here. Round-robin (least_conn) distributes load evenly.
# ──────────────────────────────────────────────────────────────────────────────

upstream backend {
    # least_conn routes to the instance with fewest active connections
    least_conn;
    server backend:3001;
    # Scale horizontally by adding more lines:
    # server backend_2:3001;
    # server backend_3:3001;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 8;
}

# ── Rate limiting zones (Nginx layer — defence before hitting Node) ───────────
# 10 req/s per IP for general traffic (burst up to 20 with no delay)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# 2 req/s per IP for auth endpoints (login/register bruteforce protection)
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

# ── Logging format ────────────────────────────────────────────────────────────
# Named 'scm' to avoid clash with nginx:alpine's built-in 'main' format
log_format scm '$remote_addr - $remote_user [$time_local] "$request" '
               '$status $body_bytes_sent "$http_referer" '
               '"$http_user_agent" rt=$request_time '
               'upstream_rt=$upstream_response_time';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log scm;
    error_log  /var/log/nginx/error.log warn;

    # Max upload size (for file attachments if any)
    client_max_body_size 10M;

    # Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # Security headers (Nginx layer — Helmet adds more at app level)
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Health check (bypass rate limiter) ────────────────────────────────────
    location = /health {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Prometheus metrics (restrict to localhost / internal Docker network) ──
    location = /metrics {
        allow  172.16.0.0/12;   # Docker bridge networks
        allow  10.0.0.0/8;
        allow  127.0.0.1;
        deny   all;
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Auth routes — stricter rate limit ────────────────────────────────────
    location ~ ^/api/(auth|users/login|users/register) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    # ── REST API routes ───────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # ── Socket.IO — WebSocket upgrade ────────────────────────────────────────
    # No rate limiting here — Socket.IO has its own auth middleware
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Keep WebSocket connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Frontend SPA — everything else ───────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }
}
